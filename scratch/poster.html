<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-N Academy - البوستر الإعلاني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#1a1a2e',
                        gold: '#F5C518',
                        accent: '#4f46e5'
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .glow { text-shadow: 0 0 20px rgba(245, 197, 24, 0.6); }
        .bg-gradient-custom {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
    </style>
</head>
<body class="bg-gradient-custom min-h-screen flex items-center justify-center p-8">

    <!-- حاوية البوستر - يمكنك أخذ لقطة شاشة (Screenshot) لهذا الجزء -->
    <div class="relative w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl border border-gold/20 flex flex-col md:flex-row aspect-video bg-dark">
        
        <!-- الديكورات والخلفية -->
        <div class="absolute top-0 right-0 w-64 h-64 bg-gold rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute bottom-0 left-0 w-80 h-80 bg-accent rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <!-- الجزء الكتابي (اليمين) -->
        <div class="relative z-10 w-full md:w-3/5 p-12 flex flex-col justify-center">
            <div class="inline-block px-4 py-1.5 rounded-full bg-accent/20 border border-accent/50 text-accent-light text-sm font-bold mb-6 w-max text-white">
                🚀 الإطلاق الرسمي
            </div>
            
            <h1 class="text-5xl font-black text-white leading-tight mb-4">
                التعليم بقى أذكى مع<br>
                <span class="text-gold glow">A-N Academy</span>
            </h1>
            
            <p class="text-gray-300 text-lg mb-8 leading-relaxed">
                منصة تفاعلية متكاملة لطلاب الأستاذ أحمد خالد. امتحن من موبايلك، اعرف نتيجتك فوراً، وتابع مستواك خطوة بخطوة بأعلى معايير الدقة والأمان.
            </p>
            
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center text-gold">✓</div>
                    <span class="text-white text-lg font-bold">دخول سريع بكود فقط</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center text-gold">✓</div>
                    <span class="text-white text-lg font-bold">نتائج فورية ومفصلة</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center text-gold">✓</div>
                    <span class="text-white text-lg font-bold">نظام ذكي يمنع الغش</span>
                </div>
            </div>
        </div>

        <!-- الجزء الصوري (اليسار) -->
        <div class="relative z-10 w-full md:w-2/5 bg-gradient-to-br from-accent/20 to-transparent flex items-center justify-center p-8 border-r border-white/5">
            <!-- شكل هاتف (Mockup) -->
            <div class="w-full max-w-xs aspect-[9/19] bg-gray-900 rounded-[2.5rem] border-8 border-gray-800 shadow-2xl relative overflow-hidden flex flex-col">
                <!-- شاشة الهاتف -->
                <div class="flex-1 bg-dark p-4 flex flex-col gap-4">
                    <div class="w-full h-8 flex justify-between items-center border-b border-white/10 pb-2">
                        <div class="text-gold font-bold text-xs">A-N Academy</div>
                        <div class="text-white/50 text-xs">10:00</div>
                    </div>
                    <div class="w-full h-24 bg-accent/20 rounded-xl flex items-center justify-center border border-accent/30">
                        <span class="text-accent text-3xl">⏱️ 14:59</span>
                    </div>
                    <div class="w-full h-10 bg-white/5 rounded-lg mt-2"></div>
                    <div class="w-full h-10 bg-white/5 rounded-lg"></div>
                    <div class="w-full h-10 bg-gold/20 border border-gold/50 rounded-lg flex items-center px-3">
                        <div class="w-4 h-4 rounded-full bg-gold mr-2"></div>
                    </div>
                    <div class="w-full h-10 bg-white/5 rounded-lg"></div>
                    
                    <div class="mt-auto w-full h-12 bg-gold rounded-xl flex items-center justify-center text-dark font-bold">
                        تأكيد الإجابة
                    </div>
                </div>
            </div>
        </div>
        
    </div>

</body>
</html>
